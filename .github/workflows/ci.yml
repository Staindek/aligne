# ─────────────────────────────────────────────────────────────────────────────
# Continuous Integration: corre en cada PR contra main y en cada push a main.
#
# Dos jobs en paralelo (backend y frontend). Cada uno:
#  1. Checkout del código
#  2. Setup Node 20 + cache de npm basado en el lockfile
#  3. `npm ci` (install determinístico desde lockfile, falla si lockfile
#     no coincide con package.json)
#  4. Lint (sin --fix — CI no debe mutar archivos)
#  5. Build (compilación TS / Next build)
#  6. Test (solo backend; --passWithNoTests permite seguir hasta que existan)
#
# Estos checks son referenciados por la branch protection rule de `main`:
# si alguno falla, GitHub bloquea el merge del PR. La separación dev/prod
# deja de ser convención y pasa a ser regla server-side.
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancela runs anteriores en la misma rama/PR si pusheás de nuevo.
# Ahorra minutos de runner y evita que checks viejos "ganen" cuando hay race.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install (npm ci)
        run: npm ci

      - name: Lint (sin --fix)
        # Llamamos eslint directo para evitar el `--fix` del script de package.json,
        # que mutaría archivos en el runner y haría que CI pase silenciosamente
        # cuando hay issues auto-fixables.
        run: npx eslint "{src,apps,libs,test}/**/*.ts"

      - name: Build
        run: npm run build

      - name: Test
        # --passWithNoTests permite que CI quede verde mientras todavía no
        # hay specs. Quitar este flag cuando se agreguen los primeros tests.
        run: npm test -- --passWithNoTests

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install (npm ci)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        # NEXT_PUBLIC_* se hornean en build time. Pasamos un valor dummy
        # razonable para localhost — en deploys reales (Fase 4) este viene
        # como secreto desde GitHub Actions secrets.
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1
        run: npm run build
